services:
    postgres:
        image: pgvector/pgvector:pg16
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-reader}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
            POSTGRES_DB: ${POSTGRES_DB:-reader}
        volumes:
            - reader_postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER:-reader} -d ${POSTGRES_DB:-reader}",
                ]
            interval: 10s
            timeout: 5s
            retries: 5

    app:
        build:
            context: .
            dockerfile: Dockerfile.app
            args:
                NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
                NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:?NEXT_PUBLIC_GOOGLE_CLIENT_ID is required}
        restart: unless-stopped
        depends_on:
            postgres:
                condition: service_healthy
        env_file:
            - ${READER_ENV_FILE:-.env.prod}
        environment:
            DATABASE_URL: postgres://${POSTGRES_USER:-reader}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-reader}
            NODE_ENV: production
            STORAGE_DRIVER: s3
            VECTOR_STORE_DRIVER: pg
            BOOK_PROCESSING_RUNNER_ENABLED: "true"
            BOOK_PROCESSING_MAX_ATTEMPTS: ${BOOK_PROCESSING_MAX_ATTEMPTS:-3}
            BOOK_PROCESSING_POLL_INTERVAL_MS: ${BOOK_PROCESSING_POLL_INTERVAL_MS:-2000}
            BOOK_PROCESSING_RETRY_DELAY_MS: ${BOOK_PROCESSING_RETRY_DELAY_MS:-5000}
            BOOK_PROCESSING_CONCURRENCY: "1"
            API_PORT: ${API_PORT:-3000}
            WEB_PORT: ${WEB_PORT:-3001}
        ports:
            - "127.0.0.1:${API_PORT:-3000}:${API_PORT:-3000}"
            - "127.0.0.1:${WEB_PORT:-3001}:${WEB_PORT:-3001}"

volumes:
    reader_postgres_data:
