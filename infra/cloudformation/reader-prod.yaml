AWSTemplateFormatVersion: "2010-09-09"
Description: Reader production infrastructure, deployable from a clean AWS account
Metadata:
  Source:
    Region: us-east-1
    Runbook: docs/aws-cloudformation-rebuild.md
    Mode: clean-account-redeployment

Parameters:
  JwtSecretValue:
    Type: String
    NoEcho: true
  OpenAiApiKeySecretValue:
    Type: String
    NoEcho: true
  GoogleClientId:
    Type: String
  GoogleClientSecretValue:
    Type: String
    NoEcho: true
  ChromaServerAuthnCredentialsSecretValue:
    Type: String
    NoEcho: true
  ChromaClientAuthCredentialsSecretValue:
    Type: String
    NoEcho: true
  FrontendUrl:
    Type: String
  ApiDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
  WorkerDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
  WebDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
  ChromaDesiredCount:
    Type: Number
    Default: 0
    MinValue: 0
  ChromaImage:
    Type: String
    Default: chromadb/chroma:1.0.15
  DatabaseDeletionProtection:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"

Resources:
  ReaderProdVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-vpc

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ReaderProdVpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.0.0/20
      MapPublicIpOnLaunch: false
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-subnet-public1-us-east-1a

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ReaderProdVpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.16.0/20
      MapPublicIpOnLaunch: false
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-subnet-public2-us-east-1b

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ReaderProdVpc
      AvailabilityZone: !Select [0, !GetAZs ""]
      CidrBlock: 10.0.128.0/20
      MapPublicIpOnLaunch: false
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-subnet-private1-us-east-1a

  PrivateSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ReaderProdVpc
      AvailabilityZone: !Select [1, !GetAZs ""]
      CidrBlock: 10.0.144.0/20
      MapPublicIpOnLaunch: false
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-subnet-private2-us-east-1b

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-vpc

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref ReaderProdVpc
      InternetGatewayId: !Ref InternetGateway

  RegionalNatEipA:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-regional-nat-eip-a

  RegionalNatEipB:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-regional-nat-eip-b

  RegionalNatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      VpcId: !Ref ReaderProdVpc
      ConnectivityType: public
      AvailabilityMode: regional
      AvailabilityZoneAddresses:
        - AvailabilityZone: !Select [0, !GetAZs ""]
          AllocationIds:
            - !GetAtt RegionalNatEipA.AllocationId
        - AvailabilityZone: !Select [1, !GetAZs ""]
          AllocationIds:
            - !GetAtt RegionalNatEipB.AllocationId
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-regional-nat

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ReaderProdVpc
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-public-rtb

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref PublicRouteTable

  PublicSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetB
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTableA:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ReaderProdVpc
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-private-rtb-a

  PrivateRouteTableB:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ReaderProdVpc
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-private-rtb-b

  PrivateDefaultRouteA:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableA
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref RegionalNatGateway

  PrivateDefaultRouteB:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTableB
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref RegionalNatGateway

  PrivateSubnetARouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetA
      RouteTableId: !Ref PrivateRouteTableA

  PrivateSubnetBRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnetB
      RouteTableId: !Ref PrivateRouteTableB

  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      ServiceName: !Sub com.amazonaws.${AWS::Region}.s3
      VpcEndpointType: Gateway
      VpcId: !Ref ReaderProdVpc
      RouteTableIds:
        - !Ref PrivateRouteTableA
        - !Ref PrivateRouteTableB
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-s3-gateway-endpoint

  ApiAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-api-alb-sg
      GroupDescription: Reader API ALB security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-api-alb-sg

  WebAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-prod-web-alb-sg
      GroupDescription: Reader prod web ALB security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-alb-sg

  EcsTasksSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-ecs-tasks-sg
      GroupDescription: Reader ECS API and worker tasks security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-ecs-tasks-sg

  WebTaskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-prod-web-task-sg
      GroupDescription: Reader prod web task security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-task-sg

  ChromaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-chroma-sg
      GroupDescription: Reader Chroma security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-chroma-sg

  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-rds-sg
      GroupDescription: Reader RDS security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-rds-sg

  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-redis-sg
      GroupDescription: Reader Redis security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-redis-sg

  EfsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: reader-efs-sg
      GroupDescription: Reader EFS security group
      VpcId: !Ref ReaderProdVpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-efs-sg

  EcsTasksIngressFromApiAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EcsTasksSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref ApiAlbSecurityGroup

  WebTaskIngressFromWebAlb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref WebTaskSecurityGroup
      IpProtocol: tcp
      FromPort: 3000
      ToPort: 3000
      SourceSecurityGroupId: !Ref WebAlbSecurityGroup

  ChromaIngressFromEcsTasks:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref ChromaSecurityGroup
      IpProtocol: tcp
      FromPort: 8000
      ToPort: 8000
      SourceSecurityGroupId: !Ref EcsTasksSecurityGroup

  RdsIngressFromEcsTasks:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RdsSecurityGroup
      IpProtocol: tcp
      FromPort: 5432
      ToPort: 5432
      SourceSecurityGroupId: !Ref EcsTasksSecurityGroup

  RedisIngressFromEcsTasks:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref RedisSecurityGroup
      IpProtocol: tcp
      FromPort: 6379
      ToPort: 6379
      SourceSecurityGroupId: !Ref EcsTasksSecurityGroup

  EfsIngressFromChroma:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EfsSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref ChromaSecurityGroup

  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-api
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-api

  WorkerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-worker
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-worker

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-web
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-web

  GitHubActionsOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: token.actions.githubusercontent.com
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReaderProdSecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:reader/prod/*
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: ecsTaskExecutionRole

  ApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-prod-api-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReaderUploadsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${UploadsBucket.Arn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt UploadsBucket.Arn
      Tags:
        - Key: project
          Value: reader

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-prod-worker-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReaderUploadsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${UploadsBucket.Arn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt UploadsBucket.Arn
      Tags:
        - Key: project
          Value: reader

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-github-actions-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubActionsOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: repo:androso/reader-backend:*
      Policies:
        - PolicyName: ReaderGitHubActionsDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRAuthAndPush
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeRepositories
                  - ecr:CreateRepository
                Resource: "*"
              - Sid: ECSRunAndDeploy
                Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:DescribeTasks
                  - ecs:StopTask
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Sid: PassRoleForECSTasks
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/*
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
                      - ecs.amazonaws.com
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: "*"
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-github-actions-deploy-role

  DbCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/DB_CREDENTIALS
      GenerateSecretString:
        SecretStringTemplate: '{"username":"postgres"}'
        GenerateStringKey: password
        PasswordLength: 32
        ExcludePunctuation: true
      Tags:
        - Key: project
          Value: reader

  DatabaseUrlSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/DATABASE_URL
      SecretString: !Sub postgresql://postgres:{{resolve:secretsmanager:${DbCredentialsSecret}:SecretString:password}}@${PostgresInstance.Endpoint.Address}:${PostgresInstance.Endpoint.Port}/reader
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/DATABASE_URL

  RedisUrlSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/REDIS_URL
      SecretString: !Sub redis://${RedisCluster.PrimaryEndPoint.Address}:${RedisCluster.PrimaryEndPoint.Port}
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/REDIS_URL

  JwtSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/JWT_SECRET
      SecretString: !Ref JwtSecretValue
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/JWT_SECRET

  OpenAiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/OPENAI_API_KEY
      SecretString: !Ref OpenAiApiKeySecretValue
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/OPENAI_API_KEY

  ChromaServerAuthnCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/CHROMA_SERVER_AUTHN_CREDENTIALS
      SecretString: !Ref ChromaServerAuthnCredentialsSecretValue
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/CHROMA_SERVER_AUTHN_CREDENTIALS

  ChromaClientAuthCredentialsSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/CHROMA_CLIENT_AUTH_CREDENTIALS
      SecretString: !Ref ChromaClientAuthCredentialsSecretValue
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/CHROMA_CLIENT_AUTH_CREDENTIALS

  GoogleClientSecretSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: reader/prod/GOOGLE_CLIENT_SECRET
      SecretString: !Ref GoogleClientSecretValue
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader/prod/GOOGLE_CLIENT_SECRET

  ContainerInsightsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/containerinsights/reader-prod/performance
      RetentionInDays: 1
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /aws/ecs/containerinsights/reader-prod/performance

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/api
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/api

  ChromaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/chroma
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/chroma

  MigrationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/migration
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/migration

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/web
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/web

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/worker
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/worker

  UploadsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub reader-prod-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - BucketKeyEnabled: true
            ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: !Sub reader-prod-${AWS::AccountId}-${AWS::Region}

  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: reader-prod-postgres-subnets
      DBSubnetGroupDescription: Reader prod private RDS subnet group
      SubnetIds:
        - !Ref PrivateSubnetB
        - !Ref PrivateSubnetA
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-postgres-subnets

  PostgresInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Snapshot
    UpdateReplacePolicy: Snapshot
    Properties:
      DBInstanceIdentifier: reader-prod-postgres
      Engine: postgres
      EngineVersion: "18.3"
      DBInstanceClass: db.t4g.micro
      DBName: reader
      MasterUsername: postgres
      MasterUserPassword: !Sub "{{resolve:secretsmanager:${DbCredentialsSecret}:SecretString:password}}"
      AllocatedStorage: 20
      StorageType: gp3
      StorageEncrypted: true
      MultiAZ: false
      PubliclyAccessible: false
      DeletionProtection: !Ref DatabaseDeletionProtection
      BackupRetentionPeriod: 1
      PreferredBackupWindow: 08:46-09:16
      PreferredMaintenanceWindow: tue:03:09-tue:03:39
      CACertificateIdentifier: rds-ca-rsa2048-g1
      VPCSecurityGroups:
        - !Ref RdsSecurityGroup
      DBSubnetGroupName: !Ref RdsSubnetGroup
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-postgres

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: reader-prod-redis-subnets
      Description: Reader prod Redis private subnets
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetB
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-redis-subnets

  RedisCluster:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupId: reader-prod-redis
      ReplicationGroupDescription: Reader production Redis
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: cache.t4g.micro
      NumCacheClusters: 1
      AutomaticFailoverEnabled: false
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      TransitEncryptionEnabled: false
      AtRestEncryptionEnabled: true
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-redis

  ChromaFileSystem:
    Type: AWS::EFS::FileSystem
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Encrypted: true
      PerformanceMode: generalPurpose
      ThroughputMode: elastic
      FileSystemTags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-chroma-efs

  ChromaMountTargetA:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref ChromaFileSystem
      SubnetId: !Ref PrivateSubnetA
      SecurityGroups:
        - !Ref EfsSecurityGroup

  ChromaMountTargetB:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref ChromaFileSystem
      SubnetId: !Ref PrivateSubnetB
      SecurityGroups:
        - !Ref EfsSecurityGroup

  PrivateDnsNamespace:
    Type: AWS::ServiceDiscovery::PrivateDnsNamespace
    Properties:
      Name: reader-prod.local
      Vpc: !Ref ReaderProdVpc
      Properties:
        DnsProperties:
          SOA:
            TTL: 15
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod.local

  ChromaDiscoveryService:
    Type: AWS::ServiceDiscovery::Service
    Properties:
      Name: chroma
      NamespaceId: !Ref PrivateDnsNamespace
      DnsConfig:
        RoutingPolicy: MULTIVALUE
        DnsRecords:
          - Type: A
            TTL: 15
      HealthCheckCustomConfig:
        FailureThreshold: 1
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: chroma.reader-prod.local

  ApiLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: reader-prod-api-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref ApiAlbSecurityGroup
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api-alb

  WebLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: reader-prod-web-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      SecurityGroups:
        - !Ref WebAlbSecurityGroup
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-alb

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: reader-prod-api-tg
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      VpcId: !Ref ReaderProdVpc
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /health
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api-tg

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: reader-prod-web-tg
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      VpcId: !Ref ReaderProdVpc
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Matcher:
        HttpCode: "200-399"
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-tg

  ApiHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApiLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  WebHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: reader-prod
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-api
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-api:latest
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              HostPort: 3000
              Protocol: tcp
              Name: api-3000
              AppProtocol: http
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: PORT
              Value: "3000"
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: FRONTEND_URL
              Value: !Ref FrontendUrl
            - Name: GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucket
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecret
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Ref GoogleClientSecretSecret
            - Name: JWT_SECRET
              ValueFrom: !Ref JwtSecret
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecret
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecret
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/api
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-worker
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-worker:latest
          Essential: true
          PortMappings:
            - ContainerPort: 80
              HostPort: 80
              Protocol: tcp
              Name: worker-80-tcp
              AppProtocol: http
          Environment:
            - Name: VECTOR_STORE_BATCH_SIZE
              Value: "100"
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: VECTOR_STORE_BATCH_RETRY_DELAY_MS
              Value: "1000"
            - Name: NODE_ENV
              Value: production
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: VECTOR_STORE_CONCURRENT_BATCHES
              Value: "5"
            - Name: VECTOR_STORE_BATCH_RETRY_ATTEMPTS
              Value: "3"
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucket
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecret
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecret
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecret
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/worker
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-worker

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-web
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-web:latest
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              HostPort: 3000
              Protocol: tcp
              Name: web-3000
              AppProtocol: http
          Environment:
            - Name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub http://${ApiLoadBalancer.DNSName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/web
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web

  ChromaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-chroma
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      Volumes:
        - Name: chroma-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref ChromaFileSystem
            RootDirectory: /
            TransitEncryption: ENABLED
      ContainerDefinitions:
        - Name: chroma
          Image: !Ref ChromaImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              HostPort: 8000
              Protocol: tcp
              Name: chroma-8000
              AppProtocol: http
          Environment:
            - Name: IS_PERSISTENT
              Value: "TRUE"
            - Name: PERSIST_DIRECTORY
              Value: /chroma/chroma
            - Name: CHROMA_SERVER_AUTHN_PROVIDER
              Value: chromadb.auth.basic_authn.BasicAuthenticationServerProvider
          Secrets:
            - Name: CHROMA_SERVER_AUTHN_CREDENTIALS
              ValueFrom: !Ref ChromaServerAuthnCredentialsSecret
          MountPoints:
            - SourceVolume: chroma-data
              ContainerPath: /chroma/chroma
              ReadOnly: false
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/chroma
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-chroma

  MigrationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-migration
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: migration
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-api:latest
          Essential: true
          Command:
            - pnpm
            - exec
            - drizzle-kit
            - migrate
            - --config
            - drizzle.config.ts
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: FRONTEND_URL
              Value: !Ref FrontendUrl
            - Name: GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucket
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecret
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecret
            - Name: JWT_SECRET
              ValueFrom: !Ref JwtSecret
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecret
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Ref GoogleClientSecretSecret
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecret
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/migration
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-migration

  ApiService:
    Type: AWS::ECS::Service
    DependsOn:
      - ApiHttpListener
    Properties:
      ServiceName: reader-prod-api
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref ApiDesiredCount
      TaskDefinition: !Ref ApiTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref EcsTasksSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref ApiTargetGroup
          ContainerName: api
          ContainerPort: 3000
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: reader-prod-worker
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref WorkerDesiredCount
      TaskDefinition: !Ref WorkerTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref EcsTasksSecurityGroup
          AssignPublicIp: DISABLED
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-worker

  WebService:
    Type: AWS::ECS::Service
    DependsOn:
      - WebHttpListener
    Properties:
      ServiceName: reader-prod-web
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref WebDesiredCount
      TaskDefinition: !Ref WebTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref WebTaskSecurityGroup
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref WebTargetGroup
          ContainerName: web
          ContainerPort: 3000
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: false
          Rollback: false
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web

  ChromaService:
    Type: AWS::ECS::Service
    DependsOn:
      - ChromaMountTargetA
      - ChromaMountTargetB
    Properties:
      ServiceName: reader-prod-chroma
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref ChromaDesiredCount
      TaskDefinition: !Ref ChromaTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref PrivateSubnetA
            - !Ref PrivateSubnetB
          SecurityGroups:
            - !Ref ChromaSecurityGroup
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !GetAtt ChromaDiscoveryService.Arn
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-chroma

Outputs:
  AWSRegion:
    Value: !Ref AWS::Region
  AWSAccountId:
    Value: !Ref AWS::AccountId
  ECSCluster:
    Value: !Ref EcsCluster
  ECSApiService:
    Value: reader-prod-api
  ECSWorkerService:
    Value: reader-prod-worker
  ECSWebService:
    Value: reader-prod-web
  ECSMigrationTaskDefinition:
    Value: !Ref MigrationTaskDefinition
  ECSPrivateSubnetIds:
    Value: !Join [",", [!Ref PrivateSubnetA, !Ref PrivateSubnetB]]
  ECSTaskSecurityGroupId:
    Value: !Ref EcsTasksSecurityGroup
  ApiAlbDnsName:
    Value: !GetAtt ApiLoadBalancer.DNSName
  WebAlbDnsName:
    Value: !GetAtt WebLoadBalancer.DNSName
  ApiHealthUrl:
    Value: !Sub http://${ApiLoadBalancer.DNSName}/health
  ApiBaseUrl:
    Value: !Sub http://${ApiLoadBalancer.DNSName}
  WebUrl:
    Value: !Sub http://${WebLoadBalancer.DNSName}
  S3BucketName:
    Value: !Ref UploadsBucket
  RdsEndpoint:
    Value: !GetAtt PostgresInstance.Endpoint.Address
  RedisEndpoint:
    Value: !GetAtt RedisCluster.PrimaryEndPoint.Address
  ChromaUrl:
    Value: http://chroma.reader-prod.local:8000
  GitHubActionsDeployRoleArn:
    Value: !GetAtt GitHubActionsDeployRole.Arn
