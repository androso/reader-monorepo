AWSTemplateFormatVersion: "2010-09-09"
Description: Reader production Lightsail deployment for a single low-cost instance

Parameters:
  DomainName:
    Type: String
    Description: Public hostname for Reader, for example reader.example.com.
  RepoUrl:
    Type: String
    Description: Git repository URL cloned onto the Lightsail instance.
  RepoBranch:
    Type: String
    Default: main
    Description: Git branch to deploy on first boot.
  InstanceBlueprintId:
    Type: String
    Default: ubuntu_24_04
  InstanceBundleId:
    Type: String
    Default: nano_2_0
    Description: Lightsail bundle id. nano_2_0 is the 2GB plan.
  AvailabilityZone:
    Type: String
    Default: ""
    Description: Optional Lightsail availability zone, for example us-east-1a.
  ExistingBucketName:
    Type: String
    Default: ""
    Description: Leave empty to create a Reader uploads/backups bucket.
  AppApiPort:
    Type: Number
    Default: 3000
  AppWebPort:
    Type: Number
    Default: 3001
  GoogleClientId:
    Type: String
  GoogleClientSecretValue:
    Type: String
    NoEcho: true
  OpenAiApiKeySecretValue:
    Type: String
    NoEcho: true
  JwtSecretValue:
    Type: String
    NoEcho: true
  PostgresPasswordValue:
    Type: String
    NoEcho: true
  LangfusePublicKey:
    Type: String
    Default: ""
  LangfuseSecretKeyValue:
    Type: String
    NoEcho: true
    Default: ""
  LangfuseBaseUrl:
    Type: String
    Default: ""
  LangfuseSampleRate:
    Type: String
    Default: "1"
  LangfuseCaptureContent:
    Type: String
    Default: metadata
    AllowedValues:
      - metadata
      - snippets
  LangfuseMaxCaptureChars:
    Type: Number
    Default: 500
    MinValue: 20

Conditions:
  CreateUploadsBucket: !Equals [!Ref ExistingBucketName, ""]
  HasAvailabilityZone: !Not [!Equals [!Ref AvailabilityZone, ""]]

Resources:
  UploadsBucket:
    Type: AWS::S3::Bucket
    Condition: CreateUploadsBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub reader-prod-${AWS::AccountId}-${AWS::Region}
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: project
          Value: reader

  S3AccessUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub ${AWS::StackName}-lightsail-s3
      Policies:
        - PolicyName: reader-lightsail-s3-access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub
                  - arn:${AWS::Partition}:s3:::${BucketName}/*
                  - BucketName: !If
                      - CreateUploadsBucket
                      - !Ref UploadsBucket
                      - !Ref ExistingBucketName
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub
                  - arn:${AWS::Partition}:s3:::${BucketName}
                  - BucketName: !If
                      - CreateUploadsBucket
                      - !Ref UploadsBucket
                      - !Ref ExistingBucketName

  S3AccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref S3AccessUser

  ReaderStaticIp:
    Type: AWS::Lightsail::StaticIp
    Properties:
      StaticIpName: !Sub ${AWS::StackName}-ip
      AttachedTo: !Ref ReaderInstance

  ReaderInstance:
    Type: AWS::Lightsail::Instance
    DependsOn:
      - S3AccessKey
    Properties:
      InstanceName: !Sub ${AWS::StackName}-app
      BlueprintId: !Ref InstanceBlueprintId
      BundleId: !Ref InstanceBundleId
      AvailabilityZone: !If
        - HasAvailabilityZone
        - !Ref AvailabilityZone
        - !Ref AWS::NoValue
      Networking:
        Ports:
          - FromPort: 22
            ToPort: 22
            Protocol: tcp
            Cidrs:
              - 0.0.0.0/0
          - FromPort: 80
            ToPort: 80
            Protocol: tcp
            Cidrs:
              - 0.0.0.0/0
          - FromPort: 443
            ToPort: 443
            Protocol: tcp
            Cidrs:
              - 0.0.0.0/0
      Tags:
        - Key: project
          Value: reader
      UserData: !Sub
          - |
            #!/usr/bin/env bash
            set -euo pipefail

            exec > >(tee -a /var/log/reader-bootstrap.log) 2>&1
            echo "Reader bootstrap started at $(date -Is)"

            install -d -o ubuntu -g ubuntu /opt/reader
            echo "Created /opt/reader"

            export DEBIAN_FRONTEND=noninteractive
            apt-get update -o Acquire::Retries=5
            apt-get install -y ca-certificates curl git

            if [ ! -d /opt/reader/.git ]; then
              runuser -u ubuntu -- git clone --branch '${RepoBranch}' --single-branch '${RepoUrl}' /opt/reader
            fi

            export READER_DOMAIN='${DomainName}'
            export REPO_BRANCH='${RepoBranch}'
            export POSTGRES_USER='reader'
            export POSTGRES_PASSWORD='${PostgresPasswordValue}'
            export POSTGRES_DB='reader'
            export JWT_SECRET='${JwtSecretValue}'
            export FRONTEND_URL='https://${DomainName}'
            export API_PORT='${AppApiPort}'
            export WEB_PORT='${AppWebPort}'
            export NEXT_PUBLIC_GOOGLE_CLIENT_ID='${GoogleClientId}'
            export GOOGLE_CLIENT_ID='${GoogleClientId}'
            export GOOGLE_CLIENT_SECRET='${GoogleClientSecretValue}'
            export OPENAI_API_KEY='${OpenAiApiKeySecretValue}'
            export S3_REGION='${AWS::Region}'
            export S3_BUCKET_NAME='${BucketName}'
            export AWS_ACCESS_KEY_ID='${S3AccessKey}'
            export AWS_SECRET_ACCESS_KEY='${S3SecretAccessKey}'
            export LANGFUSE_PUBLIC_KEY='${LangfusePublicKey}'
            export LANGFUSE_SECRET_KEY='${LangfuseSecretKeyValue}'
            export LANGFUSE_BASE_URL='${LangfuseBaseUrl}'
            export LANGFUSE_SAMPLE_RATE='${LangfuseSampleRate}'
            export LANGFUSE_CAPTURE_CONTENT='${LangfuseCaptureContent}'
            export LANGFUSE_MAX_CAPTURE_CHARS='${LangfuseMaxCaptureChars}'

            cd /opt/reader
            bash scripts/bootstrap-lightsail-instance.sh
            echo "Reader bootstrap finished at $(date -Is)"
          - BucketName: !If
              - CreateUploadsBucket
              - !Ref UploadsBucket
              - !Ref ExistingBucketName
            S3SecretAccessKey: !GetAtt S3AccessKey.SecretAccessKey

Outputs:
  AWSRegion:
    Value: !Ref AWS::Region
  LightsailInstanceName:
    Value: !Ref ReaderInstance
  StaticIpAddress:
    Value: !GetAtt ReaderStaticIp.IpAddress
  AppUrl:
    Value: !Sub https://${DomainName}
  SshCommand:
    Value: !Sub
      - ssh ubuntu@${IpAddress}
      - IpAddress: !GetAtt ReaderStaticIp.IpAddress
  S3BucketName:
    Value: !If
      - CreateUploadsBucket
      - !Ref UploadsBucket
      - !Ref ExistingBucketName
  S3AccessKeyId:
    Value: !Ref S3AccessKey
