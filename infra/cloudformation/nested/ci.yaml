AWSTemplateFormatVersion: "2010-09-09"
Description: Reader production image repositories and GitHub deploy identity

Parameters:
  DeployStackName:
    Type: String
    Description: Root CloudFormation stack name that GitHub Actions reads for deployment outputs.

Resources:
  ApiRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-api
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-api

  WorkerRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-worker
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-worker

  WebRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: reader-web
      ImageTagMutability: MUTABLE
      ImageScanningConfiguration:
        ScanOnPush: false
      EncryptionConfiguration:
        EncryptionType: AES256
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-web

  GitHubActionsOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: token.actions.githubusercontent.com

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-github-actions-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubActionsOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringEquals:
                token.actions.githubusercontent.com:sub: repo:androso/reader-backend:ref:refs/heads/main
      Policies:
        - PolicyName: ReaderGitHubActionsDeployPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ECRAuthAndPush
                Effect: Allow
                Action:
                  - ecr:GetAuthorizationToken
                  - ecr:BatchCheckLayerAvailability
                  - ecr:GetDownloadUrlForLayer
                  - ecr:BatchGetImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:PutImage
                  - ecr:DescribeRepositories
                  - ecr:CreateRepository
                Resource: "*"
              - Sid: ECSRunAndDeploy
                Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:DescribeTasks
                  - ecs:StopTask
                  - ecs:UpdateService
                  - ecs:DescribeServices
                  - ecs:RegisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Sid: PassRoleForECSTasks
                Effect: Allow
                Action: iam:PassRole
                Resource:
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/ecsTaskExecutionRole
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/reader-prod-api-task-role
                  - !Sub arn:${AWS::Partition}:iam::${AWS::AccountId}:role/reader-prod-worker-task-role
                Condition:
                  StringEqualsIfExists:
                    iam:PassedToService:
                      - ecs-tasks.amazonaws.com
                      - ecs.amazonaws.com
              - Sid: CloudWatchLogs
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                Resource: "*"
              - Sid: ReadDeploymentStackOutputs
                Effect: Allow
                Action: cloudformation:DescribeStacks
                Resource: !Sub arn:${AWS::Partition}:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${DeployStackName}/*
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-github-actions-deploy-role

Outputs:
  ApiRepositoryUri:
    Value: !GetAtt ApiRepository.RepositoryUri
  WorkerRepositoryUri:
    Value: !GetAtt WorkerRepository.RepositoryUri
  WebRepositoryUri:
    Value: !GetAtt WebRepository.RepositoryUri
  GitHubActionsDeployRoleArn:
    Value: !GetAtt GitHubActionsDeployRole.Arn
