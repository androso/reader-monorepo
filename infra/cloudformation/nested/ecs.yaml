AWSTemplateFormatVersion: "2010-09-09"
Description: Reader production ECS runtime, load balancers, task roles, and logs

Parameters:
  FrontendUrl:
    Type: String
  GoogleClientId:
    Type: String
  ApiDesiredCount:
    Type: Number
    MinValue: 0
  WorkerDesiredCount:
    Type: Number
    MinValue: 0
  WebDesiredCount:
    Type: Number
    MinValue: 0
  ChromaDesiredCount:
    Type: Number
    MinValue: 0
  ChromaImage:
    Type: String
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  PrivateSubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
  ApiAlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  WebAlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  EcsTasksSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  WebTaskSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  ChromaSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  UploadsBucketName:
    Type: String
  UploadsBucketArn:
    Type: String
  DatabaseUrlSecretArn:
    Type: String
  RedisUrlSecretArn:
    Type: String
  JwtSecretArn:
    Type: String
  OpenAiApiKeySecretArn:
    Type: String
  ChromaServerAuthnCredentialsSecretArn:
    Type: String
  ChromaClientAuthCredentialsSecretArn:
    Type: String
  GoogleClientSecretSecretArn:
    Type: String
  ChromaFileSystemId:
    Type: String
  ChromaDiscoveryServiceArn:
    Type: String

Resources:
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: ecsTaskExecutionRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ReaderProdSecretsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub arn:${AWS::Partition}:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:reader/prod/*
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: ecsTaskExecutionRole

  ApiTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-prod-api-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReaderUploadsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${UploadsBucketArn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Ref UploadsBucketArn
      Tags:
        - Key: project
          Value: reader

  WorkerTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: reader-prod-worker-task-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: ReaderUploadsAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub ${UploadsBucketArn}/*
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !Ref UploadsBucketArn
      Tags:
        - Key: project
          Value: reader

  ContainerInsightsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/ecs/containerinsights/reader-prod/performance
      RetentionInDays: 1
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /aws/ecs/containerinsights/reader-prod/performance

  ApiLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/api
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/api

  ChromaLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/chroma
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/chroma

  MigrationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/migration
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/migration

  WebLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/web
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/web

  WorkerLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/reader-prod/worker
      RetentionInDays: 30
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: /ecs/reader-prod/worker

  ApiLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: reader-prod-api-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Select [0, !Ref PublicSubnetIds]
        - !Select [1, !Ref PublicSubnetIds]
      SecurityGroups:
        - !Ref ApiAlbSecurityGroupId
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api-alb

  WebLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: reader-prod-web-alb
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Select [0, !Ref PublicSubnetIds]
        - !Select [1, !Ref PublicSubnetIds]
      SecurityGroups:
        - !Ref WebAlbSecurityGroupId
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-alb

  ApiTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: reader-prod-api-tg
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /health
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api-tg

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: reader-prod-web-tg
      Protocol: HTTP
      Port: 3000
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckProtocol: HTTP
      HealthCheckPort: traffic-port
      HealthCheckPath: /
      Matcher:
        HttpCode: "200-399"
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web-tg

  ApiHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApiLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ApiTargetGroup

  WebHttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WebLoadBalancer
      Protocol: HTTP
      Port: 80
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: reader-prod
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-api
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-api:latest
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              HostPort: 3000
              Protocol: tcp
              Name: api-3000
              AppProtocol: http
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: PORT
              Value: "3000"
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: FRONTEND_URL
              Value: !Ref FrontendUrl
            - Name: GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucketName
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecretArn
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Ref GoogleClientSecretSecretArn
            - Name: JWT_SECRET
              ValueFrom: !Ref JwtSecretArn
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecretArn
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecretArn
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/api
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api

  WorkerTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-worker
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt WorkerTaskRole.Arn
      ContainerDefinitions:
        - Name: worker
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-worker:latest
          Essential: true
          PortMappings:
            - ContainerPort: 80
              HostPort: 80
              Protocol: tcp
              Name: worker-80-tcp
              AppProtocol: http
          Environment:
            - Name: VECTOR_STORE_BATCH_SIZE
              Value: "100"
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: VECTOR_STORE_BATCH_RETRY_DELAY_MS
              Value: "1000"
            - Name: NODE_ENV
              Value: production
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: VECTOR_STORE_CONCURRENT_BATCHES
              Value: "5"
            - Name: VECTOR_STORE_BATCH_RETRY_ATTEMPTS
              Value: "3"
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucketName
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecretArn
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecretArn
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecretArn
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/worker
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-worker

  WebTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-web
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: web
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-web:latest
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              HostPort: 3000
              Protocol: tcp
              Name: web-3000
              AppProtocol: http
          Environment:
            - Name: NEXT_PUBLIC_GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: NEXT_PUBLIC_API_URL
              Value: !Sub http://${ApiLoadBalancer.DNSName}
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/web
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web

  ChromaTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-chroma
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      Volumes:
        - Name: chroma-data
          EFSVolumeConfiguration:
            FilesystemId: !Ref ChromaFileSystemId
            RootDirectory: /
            TransitEncryption: ENABLED
      ContainerDefinitions:
        - Name: chroma
          Image: !Ref ChromaImage
          Essential: true
          PortMappings:
            - ContainerPort: 8000
              HostPort: 8000
              Protocol: tcp
              Name: chroma-8000
              AppProtocol: http
          Environment:
            - Name: IS_PERSISTENT
              Value: "TRUE"
            - Name: PERSIST_DIRECTORY
              Value: /chroma/chroma
            - Name: CHROMA_SERVER_AUTHN_PROVIDER
              Value: chromadb.auth.basic_authn.BasicAuthenticationServerProvider
          Secrets:
            - Name: CHROMA_SERVER_AUTHN_CREDENTIALS
              ValueFrom: !Ref ChromaServerAuthnCredentialsSecretArn
          MountPoints:
            - SourceVolume: chroma-data
              ContainerPath: /chroma/chroma
              ReadOnly: false
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/chroma
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-chroma

  MigrationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: reader-prod-migration
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "1024"
      Memory: "2048"
      RuntimePlatform:
        CpuArchitecture: X86_64
        OperatingSystemFamily: LINUX
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt ApiTaskRole.Arn
      ContainerDefinitions:
        - Name: migration
          Image: !Sub ${AWS::AccountId}.dkr.ecr.${AWS::Region}.amazonaws.com/reader-api:latest
          Essential: true
          Command:
            - pnpm
            - exec
            - drizzle-kit
            - migrate
            - --config
            - drizzle.config.ts
          Environment:
            - Name: NODE_ENV
              Value: production
            - Name: PORT
              Value: "3000"
            - Name: CHROMA_URL
              Value: http://chroma.reader-prod.local:8000
            - Name: STORAGE_DRIVER
              Value: s3
            - Name: FRONTEND_URL
              Value: !Ref FrontendUrl
            - Name: GOOGLE_CLIENT_ID
              Value: !Ref GoogleClientId
            - Name: S3_BUCKET_NAME
              Value: !Ref UploadsBucketName
            - Name: S3_REGION
              Value: !Ref AWS::Region
          Secrets:
            - Name: DATABASE_URL
              ValueFrom: !Ref DatabaseUrlSecretArn
            - Name: REDIS_URL
              ValueFrom: !Ref RedisUrlSecretArn
            - Name: JWT_SECRET
              ValueFrom: !Ref JwtSecretArn
            - Name: OPENAI_API_KEY
              ValueFrom: !Ref OpenAiApiKeySecretArn
            - Name: GOOGLE_CLIENT_SECRET
              ValueFrom: !Ref GoogleClientSecretSecretArn
            - Name: CHROMA_CLIENT_AUTH_CREDENTIALS
              ValueFrom: !Ref ChromaClientAuthCredentialsSecretArn
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: /ecs/reader-prod/migration
              awslogs-region: us-east-1
              awslogs-stream-prefix: ecs
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-migration

  ApiService:
    Type: AWS::ECS::Service
    DependsOn:
      - ApiHttpListener
    Properties:
      ServiceName: reader-prod-api
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref ApiDesiredCount
      TaskDefinition: !Ref ApiTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Select [0, !Ref PrivateSubnetIds]
            - !Select [1, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref EcsTasksSecurityGroupId
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref ApiTargetGroup
          ContainerName: api
          ContainerPort: 3000
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-api

  WorkerService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: reader-prod-worker
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref WorkerDesiredCount
      TaskDefinition: !Ref WorkerTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Select [0, !Ref PrivateSubnetIds]
            - !Select [1, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref EcsTasksSecurityGroupId
          AssignPublicIp: DISABLED
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-worker

  WebService:
    Type: AWS::ECS::Service
    DependsOn:
      - WebHttpListener
    Properties:
      ServiceName: reader-prod-web
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref WebDesiredCount
      TaskDefinition: !Ref WebTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Select [0, !Ref PrivateSubnetIds]
            - !Select [1, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref WebTaskSecurityGroupId
          AssignPublicIp: DISABLED
      LoadBalancers:
        - TargetGroupArn: !Ref WebTargetGroup
          ContainerName: web
          ContainerPort: 3000
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: false
          Rollback: false
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-web

  ChromaService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: reader-prod-chroma
      Cluster: !Ref EcsCluster
      LaunchType: FARGATE
      DesiredCount: !Ref ChromaDesiredCount
      TaskDefinition: !Ref ChromaTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Select [0, !Ref PrivateSubnetIds]
            - !Select [1, !Ref PrivateSubnetIds]
          SecurityGroups:
            - !Ref ChromaSecurityGroupId
          AssignPublicIp: DISABLED
      ServiceRegistries:
        - RegistryArn: !Ref ChromaDiscoveryServiceArn
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
        MaximumPercent: 200
        MinimumHealthyPercent: 100
      Tags:
        - Key: project
          Value: reader
        - Key: Name
          Value: reader-prod-chroma

Outputs:
  ECSCluster:
    Value: !Ref EcsCluster
  ECSApiService:
    Value: reader-prod-api
  ECSWorkerService:
    Value: reader-prod-worker
  ECSWebService:
    Value: reader-prod-web
  ECSMigrationTaskDefinition:
    Value: !Ref MigrationTaskDefinition
  ApiAlbDnsName:
    Value: !GetAtt ApiLoadBalancer.DNSName
  WebAlbDnsName:
    Value: !GetAtt WebLoadBalancer.DNSName
  ApiHealthUrl:
    Value: !Sub http://${ApiLoadBalancer.DNSName}/health
  ApiBaseUrl:
    Value: !Sub http://${ApiLoadBalancer.DNSName}
  WebUrl:
    Value: !Sub http://${WebLoadBalancer.DNSName}
